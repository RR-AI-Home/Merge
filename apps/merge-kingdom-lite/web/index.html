<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Merge Kingdom Lite Prototype</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="status-strip" aria-label="Player status">
        <div><span>Energy</span><strong id="energy-value">--</strong></div>
        <div><span>Coins</span><strong id="coins-value">--</strong></div>
        <div><span>XP</span><strong id="xp-value">--</strong></div>
        <div><span>Premium</span><strong id="premium-value">--</strong></div>
      </section>

      <section class="command-bar" aria-label="Core actions">
        <button id="producer-button" type="button"><span class="button-icon" aria-hidden="true">+</span><span>Cart</span></button>
        <button id="daily-button" type="button"><span class="button-icon" aria-hidden="true">$</span><span>Daily</span></button>
        <button id="reset-button" type="button" class="secondary-button"><span class="button-icon" aria-hidden="true">↺</span><span>Reset</span></button>
      </section>

      <section class="goal-zone" aria-label="Session goal">
        <div><span id="goal-action">Next</span><strong id="session-goal">--</strong></div>
        <p id="goal-detail">--</p>
      </section>

      <section class="board-zone" aria-label="Merge board">
        <div class="section-heading">
          <div><span id="app-name">Merge Kingdom Lite</span><strong id="district-name">Village Green</strong></div>
          <p id="producer-status">--</p>
        </div>
        <div id="merge-board" class="merge-board" role="grid" aria-label="Merge board"></div>
      </section>

      <section class="progress-zone" aria-label="Progress">
        <div><span>Board Pressure</span><strong id="board-pressure">0 / 36</strong></div>
        <div class="progress-track" aria-hidden="true"><span id="pressure-fill"></span></div>
        <div><span>Village Orders</span><strong id="chapter-progress">0 / 1</strong></div>
        <div class="progress-track chapter-track" aria-hidden="true"><span id="chapter-fill"></span></div>
        <p id="chapter-detail">Repair the village to open events.</p>
      </section>

      <section class="orders-zone" aria-label="Orders">
        <div class="section-heading"><div><span>Orders</span><strong>Village Work</strong></div></div>
        <div id="orders-list" class="orders-list"></div>
      </section>

      <section id="event-panel" class="event-zone" aria-label="Event">
        <div><span id="event-status">Locked</span><strong id="event-title">Harvest Day</strong></div>
        <p id="event-detail">Complete village work to unlock the timed event rail.</p>
      </section>

      <section class="log-zone" aria-label="Activity log">
        <div class="section-heading"><div><span>Feed</span><strong>Recent Actions</strong></div></div>
        <ol id="action-log"></ol>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
